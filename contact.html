<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch with FLOWERBX for orders, bespoke events and enquiries." />
  <title>Contact — FLOWERBX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="contact">
  <div id="site-header-root"></div>
  <main id="top">
    <section class="page-hero"><p class="eyebrow">WE'D LOVE TO HEAR FROM YOU</p><h1>Contact us</h1><p>Questions about an order, a bespoke event, or just want to say hello — we're here.</p></section>

    <section class="contact-grid">
      <div class="contact-form">
        <h2>Send a message</h2>
        <form id="contact-form">
          <label for="contact-name">Name</label>
          <input id="contact-name" name="name" type="text" required>
          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" required>
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" required></textarea>
          <button class="button button-dark" type="submit">SEND MESSAGE</button>
        </form>
        <p id="contact-form-message" class="form-message" aria-live="polite"></p>
      </div>
      <div class="contact-details">
        <p class="eyebrow">GET IN TOUCH</p>
        <h2>Studio &amp; support</h2>
        <a href="mailto:hello@flowerbx.example">hello@flowerbx.example</a>
        <a href="tel:+442000000000">+44 20 0000 0000</a>
        <a href="events.html">Enquire about weddings &amp; bespoke events</a>
        <a href="delivery.html">Delivery information</a>
      </div>
    </section>
  </main>
  <div id="site-footer-root"></div>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.querySelector('#contact-form');
      const message = document.querySelector('#contact-form-message');
      form?.addEventListener('submit', (event) => {
        event.preventDefault();
        message.textContent = "Thank you — we'll be in touch shortly.";
        form.reset();
      });
    });
  </script>
</body>
</html>
